# push.py v0.3 workflow — supports push, list, move, delete, set-threshold, annotate
name: Push Workout to Intervals.icu

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Subcommand'
        required: false
        default: 'push'
        type: choice
        options:
          - push
          - list
          - move
          - delete
          - set-threshold
          - annotate
      workouts:
        description: 'JSON workout(s) — required for push'
        required: false
        type: string
      event_id:
        description: 'Event ID — for move/delete/annotate (planned)'
        required: false
        type: string
      date:
        description: 'Target date YYYY-MM-DD — for move'
        required: false
        type: string
      oldest:
        description: 'List start date (default: today)'
        required: false
        type: string
      newest:
        description: 'List end date (default: +6 days)'
        required: false
        type: string
      sport:
        description: 'Sport family or type — for set-threshold'
        required: false
        type: string
      ftp:
        description: 'FTP — for set-threshold'
        required: false
        type: string
      indoor_ftp:
        description: 'Indoor FTP — for set-threshold'
        required: false
        type: string
      lthr:
        description: 'LTHR — for set-threshold'
        required: false
        type: string
      max_hr:
        description: 'Max HR — for set-threshold'
        required: false
        type: string
      activity_id:
        description: 'Activity ID — for annotate (completed)'
        required: false
        type: string
      message:
        description: 'Note text — for annotate'
        required: false
        type: string
      chat:
        description: 'Post to activity chat instead of description'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      confirm:
        description: 'Execute write (false = preview only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Behebt die Node.js 20 Deprecation Warnung
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Verify push.py exists
        run: |
          if [ ! -f push.py ]; then
            echo "push.py not found in repository root!"
            exit 1
          fi
          echo "push.py found"

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "Secrets configured"

      - name: Run push.py
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          # Sicheres Mapping aller Eingaben in Umgebungsvariablen
          INPUT_CMD: ${{ github.event.inputs.command }}
          INPUT_WORKOUTS: ${{ github.event.inputs.workouts }}
          INPUT_EVENT_ID: ${{ github.event.inputs.event_id }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_OLDEST: ${{ github.event.inputs.oldest }}
          INPUT_NEWEST: ${{ github.event.inputs.newest }}
          INPUT_SPORT: ${{ github.event.inputs.sport }}
          INPUT_FTP: ${{ github.event.inputs.ftp }}
          INPUT_INDOOR_FTP: ${{ github.event.inputs.indoor_ftp }}
          INPUT_LTHR: ${{ github.event.inputs.lthr }}
          INPUT_MAX_HR: ${{ github.event.inputs.max_hr }}
          INPUT_ACTIVITY_ID: ${{ github.event.inputs.activity_id }}
          INPUT_MESSAGE:
