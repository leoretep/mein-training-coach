name: Push Workout to Intervals.icu

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Subcommand'
        required: false
        default: 'push'
        type: choice
        options:
          - push
          - list
          - move
          - delete
          - set-threshold
          - annotate
      workouts:
        description: 'JSON workout(s) — required for push'
        required: false
        type: string
      event_id:
        description: 'Event ID'
        required: false
        type: string
      date:
        description: 'Target date YYYY-MM-DD'
        required: false
        type: string
      oldest:
        description: 'List start date'
        required: false
        type: string
      newest:
        description: 'List end date'
        required: false
        type: string
      sport:
        description: 'Sport family or type'
        required: false
        type: string
      ftp:
        description: 'FTP'
        required: false
        type: string
      indoor_ftp:
        description: 'Indoor FTP'
        required: false
        type: string
      lthr:
        description: 'LTHR'
        required: false
        type: string
      max_hr:
        description: 'Max HR'
        required: false
        type: string
      activity_id:
        description: 'Activity ID'
        required: false
        type: string
      message:
        description: 'Note text'
        required: false
        type: string
      chat:
        description: 'Post to activity chat'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      confirm:
        description: 'Execute write (false = preview only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Verify push.py exists
        run: |
          if [ ! -f push.py ]; then echo "push.py not found!"; exit 1; fi
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then echo "ATHLETE_ID missing!"; exit 1; fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then echo "INTERVALS_KEY missing!"; exit 1; fi
      - name: Run push.py
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          INPUT_CMD: ${{ github.event.inputs.command }}
          INPUT_WORKOUTS: ${{ github.event.inputs.workouts }}
          INPUT_EVENT_ID: ${{ github.event.inputs.event_id }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_OLDEST: ${{ github.event.inputs.oldest }}
          INPUT_NEWEST: ${{ github.event.inputs.newest }}
          INPUT_SPORT: ${{ github.event.inputs.sport }}
          INPUT_FTP: ${{ github.event.inputs.ftp }}
          INPUT_INDOOR_FTP: ${{ github.event.inputs.indoor_ftp }}
          INPUT_LTHR: ${{ github.event.inputs.lthr }}
          INPUT_MAX_HR: ${{ github.event.inputs.max_hr }}
          INPUT_ACTIVITY_ID: ${{ github.event.inputs.activity_id }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_CHAT: ${{ github.event.inputs.chat }}
          INPUT_CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          ARGS=()
          case "$INPUT_CMD" in
            push)
              if [ -z "$INPUT_WORKOUTS" ]; then echo '{"error": "workouts required"}'; exit 1; fi
              echo "$INPUT_WORKOUTS" > /tmp/workouts.json
              ARGS=("push" "--json" "/tmp/workouts.json")
              ;;
            list)
              ARGS=("list")
              [ -n "$INPUT_OLDEST" ] && ARGS+=("--oldest" "$INPUT_OLDEST")
              [ -n "$INPUT_NEWEST" ] && ARGS+=("--newest" "$INPUT_NEWEST")
              ;;
            move)
              ARGS=("move" "--event-id" "$INPUT_EVENT_ID" "--date" "$INPUT_DATE")
              ;;
            delete)
              ARGS=("delete" "--event-id" "$INPUT_EVENT_ID")
              ;;
            set-threshold)
              ARGS=("set-threshold" "--sport" "$INPUT_SPORT")
              [ -n "$INPUT_FTP" ] && ARGS+=("--ftp" "$INPUT_FTP")
              [ -n "$INPUT_INDOOR_FTP" ] && ARGS+=("--indoor-ftp" "$INPUT_INDOOR_FTP")
              [ -n "$INPUT_LTHR" ] && ARGS+=("--lthr" "$INPUT_LTHR")
              [ -n "$INPUT_MAX_HR" ] && ARGS+=("--max-hr" "$INPUT_MAX_HR")
              ;;
            annotate)
              ARGS=("annotate" "--message" "$INPUT_MESSAGE")
              if [ -n "$INPUT_ACTIVITY_ID" ]; then ARGS+=("--activity-id" "$INPUT_ACTIVITY_ID"); elif [ -n "$INPUT_EVENT_ID" ]; then ARGS+=("--event-id" "$INPUT_EVENT_ID"); fi
              [ "$INPUT_CHAT" = "true" ] && ARGS+=("--chat")
              ;;
          esac
          if [ "$INPUT_CONFIRM" = "true" ] && [ "$INPUT_CMD" != "list" ]; then ARGS+=("--confirm"); fi
          python push.py "${ARGS[@]}"
      - name: Notify on failure
        if: failure()
        run: |
          echo "push.py failed! Check logs above."
