name: Auto-Sync Intervals.icu Data

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Verify sync.py exists
        run: |
          if [ ! -f sync.py ]; then
            echo "❌ ERROR: sync.py not found in repository!"
            echo "Files in current directory:"
            ls -la
            exit 1
          fi
          echo "✅ sync.py found"
          
      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.ATHLETE_ID }}" ]; then
            echo "❌ ERROR: ATHLETE_ID secret not set!"
            exit 1
          fi
          if [ -z "${{ secrets.INTERVALS_KEY }}" ]; then
            echo "❌ ERROR: INTERVALS_KEY secret not set!"
            exit 1
          fi
          echo "✅ All secrets configured"
          
      - name: Run sync
        env:
          ATHLETE_ID: ${{ secrets.ATHLETE_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          WEEK_START: ${{ secrets.WEEK_START }}
          ZONE_PREFERENCE: ${{ secrets.ZONE_PREFERENCE }}
        run: |
          python sync.py \
            --athlete-id "$ATHLETE_ID" \
            --intervals-key "$INTERVALS_KEY" \
            --github-token "$GITHUB_TOKEN" \
            --github-repo "$GITHUB_REPO" \
            --days 7 || {
              echo "❌ Sync script failed with exit code $?"
              exit 1
            }
            
      - name: Verify latest.json was created/updated
        run: |
          if [ -f latest.json ]; then
            echo "✅ latest.json exists"
          else
            echo "⚠️ latest.json not found - might be no changes detected"
          fi
          
      - name: Archive latest.json with timestamp
        if: success()
        run: |
          YEAR_MONTH=$(date -u +"%Y-%m")
          mkdir -p "archive/${YEAR_MONTH}"
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          
          if [ -f latest.json ]; then
            cp latest.json "archive/${YEAR_MONTH}/${TIMESTAMP}.json"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            git add archive/
            if [ -f ftp_history.json ]; then git add ftp_history.json; fi
            if [ -f history.json ]; then git add history.json; fi
            if [ -f latest.json ]; then git add latest.json; fi
            if [ -f intervals.json ]; then git add intervals.json; fi
            
            git pull --rebase --autostash origin main
            
            if ! git diff --staged --quiet; then
              git commit -m "Archive training data + FTP history - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
              git push
            fi
          fi
          
      - name: Update README with last sync time
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          SYNC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          if [ -f README.md ]; then
            if grep -q "Last successful sync:" README.md; then
              sed -i "s/\*\*Last successful sync:\*\*.*/\*\*Last successful sync:\*\* ${SYNC_TIME}/" README.md
            else
              sed -i "/badge.svg)/a\\\n\*\*Last successful sync:\*\* ${SYNC_TIME}\n" README.md
            fi
            
            if ! git diff --quiet README.md; then
              git add README.md
              git commit -m "Update last sync timestamp: ${SYNC_TIME}"
              git push
            fi
          fi

      - name: Daten an Google Drive senden
        if: success()
        run: |
          if [ -f latest.json ]; then
            curl -L -X POST -H "Content-Type: application/json" \
            -d @latest.json \
            "${{ secrets.GOOGLE_SCRIPT_URL }}"
            echo "✅ Daten erfolgreich an Google Drive gesendet"
          else
            echo "⚠️ Keine latest.json gefunden, überspringe Google Drive Sync"
          fi
          
      - name: Show result
        run: |
          echo "✅ Sync completed successfully!"
          echo "📊 View data: https://raw.githubusercontent.com/${{ github.repository }}/main/latest.json"
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::⚠️ Sync failed! Check the logs above for details."
